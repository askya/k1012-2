CONFIG_ZMK_KEYBOARD_NAME="K1012 Right"
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
# Disable unneeded features
CONFIG_ZMK_USB=y           # If using BLE only
CONFIG_ZMK_BLE=n           # If using USB only
CONFIG_ZMK_UNDERGLOW=n     # No RGB underglow
CONFIG_ZMK_BACKLIGHT=n     # No backlighting
CONFIG_ZMK_STUDIO=y        # No ZMK Studio support
CONFIG_ZMK_DISPLAY=n       # No display/OLED

# Optimize size
CONFIG_LTO=y               # Link-time optimization
CONFIG_SIZE_OPTIMIZATIONS=y
